<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tiny · editor</title>
<style>
  :root { --indigo:#6366f1; --bg:#0b0d12; --panel:#12151c; --line:#232838; --muted:#8b93a7; --text:#e7eaf0; --ok:#10b981; --err:#ef4444; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel); position:sticky; top:0; z-index:10; }
  .brand { font-weight:700; color:var(--indigo); letter-spacing:-.01em; }
  .brand small { color:var(--muted); font-weight:400; margin-left:8px; }
  label { color:var(--muted); font-size:12px; margin-right:6px; text-transform:uppercase; letter-spacing:.04em; }
  select { background:#0e1119; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font:inherit; }
  select:focus { outline:none; border-color:var(--indigo); }
  .spacer { flex:1; }
  .status { color:var(--muted); font-size:12px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ok); margin-right:6px; vertical-align:middle; }
  #stage { position:relative; height:calc(100vh - 55px); overflow:auto; }
  #canvas { position:relative; min-width:100%; min-height:100%; }
  svg.edges { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
  .node { position:absolute; min-width:150px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; box-shadow:0 4px 14px rgba(0,0,0,.35); }
  .node.blocked { opacity:.45; border-style:dashed; }
  .node .cmp { font-weight:600; }
  .node .mod { color:var(--muted); font-size:11px; margin-top:2px; }
  .empty { color:var(--muted); text-align:center; margin-top:18vh; }
  .empty code { background:#0e1119; border:1px solid var(--line); padding:2px 7px; border-radius:6px; color:var(--text); }
</style>
</head>
<body>
<header>
  <div class="brand">◇ tiny<small>editor</small></div>
  <div><label>project</label><select id="project"></select></div>
  <div><label>flow</label><select id="flow"></select></div>
  <div class="spacer"></div>
  <div class="status" id="status"><span class="dot"></span>live</div>
</header>
<div id="stage"><div id="canvas">
  <svg class="edges" id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="nodes"></div>
</div></div>

<script>
const SVGNS = "http://www.w3.org/2000/svg";
const $ = s => document.querySelector(s);
const projectSel = $('#project'), flowSel = $('#flow'), statusEl = $('#status');
const nodesEl = $('#nodes'), edgesSvg = $('#edges');

async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json(); }

function fillSelect(sel, items){
  sel.replaceChildren();
  for(const it of items){ const o = document.createElement('option'); o.textContent = it; sel.appendChild(o); }
}
function setStatus(text, ok){
  statusEl.replaceChildren();
  if(ok){ const d = document.createElement('span'); d.className='dot'; statusEl.appendChild(d); }
  statusEl.appendChild(document.createTextNode(text));
}

async function loadProjects(){
  const {projects=[]} = await j('/api/projects');
  fillSelect(projectSel, projects);
  await loadFlows();
}
async function loadFlows(){
  const p = projectSel.value;
  if(!p){ fillSelect(flowSel, []); render({nodes:[],edges:[]}); return; }
  const {flows=[]} = await j('/api/flows?project='+encodeURIComponent(p));
  fillSelect(flowSel, flows);
  tick();
}
async function tick(){
  const p = projectSel.value, f = flowSel.value;
  if(!p || !f){ render({nodes:[],edges:[]}); return; }
  try { render(await j(`/api/flow?project=${encodeURIComponent(p)}&flow=${encodeURIComponent(f)}`)); setStatus('live', true); }
  catch(e){ setStatus('error', false); }
}

function emptyState(){
  const wrap = document.createElement('div'); wrap.className='empty';
  wrap.appendChild(document.createTextNode('No nodes in this flow yet.'));
  wrap.appendChild(document.createElement('br')); wrap.appendChild(document.createElement('br'));
  wrap.appendChild(document.createTextNode('Prompt Claude Code — '));
  const c = document.createElement('code'); c.textContent = 'build me an agent'; wrap.appendChild(c);
  wrap.appendChild(document.createTextNode(' — and it appears here.'));
  return wrap;
}

function render(g){
  const nodes = g.nodes||[], edges = g.edges||[];
  const pos = {};
  nodesEl.replaceChildren();
  edgesSvg.replaceChildren();
  if(nodes.length===0){ nodesEl.appendChild(emptyState()); return; }
  for(const n of nodes){
    const d = n.data||{}; const x=(n.position&&n.position.x)||40, y=(n.position&&n.position.y)||40;
    pos[n.id] = {x, y};
    const el = document.createElement('div');
    el.className = 'node' + (d.blocked ? ' blocked':'');
    el.style.left = x+'px'; el.style.top = y+'px';
    const cmp = document.createElement('div'); cmp.className='cmp'; cmp.textContent = d.component||n.id;
    const mod = document.createElement('div'); mod.className='mod'; mod.textContent = d.module||'';
    el.appendChild(cmp); el.appendChild(mod);
    nodesEl.appendChild(el);
  }
  for(const e of edges){
    const a=pos[e.source], b=pos[e.target]; if(!a||!b) continue;
    const x1=a.x+150, y1=a.y+20, x2=b.x, y2=b.y+20, c=(x2-x1)/2;
    const path = document.createElementNS(SVGNS,'path');
    path.setAttribute('d', `M${x1},${y1} C${x1+c},${y1} ${x2-c},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', (e.data&&e.data.valid)? 'var(--indigo)':'var(--err)');
    path.setAttribute('stroke-width','2');
    edgesSvg.appendChild(path);
  }
}

projectSel.onchange = loadFlows;
flowSel.onchange = tick;
loadProjects().catch(e=>{ setStatus('error: '+e.message, false); });
setInterval(tick, 2000);
</script>
</body>
</html>
